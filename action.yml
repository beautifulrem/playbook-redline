name: Playbook Redline
description: Run Playbook Redline backend verification and upload demo artifacts.

inputs:
  package:
    description: Playbook package directory.
    default: fixtures/demo_pack
  baseline:
    description: Baseline package name under the package directory.
    default: baseline
  candidate:
    description: Candidate package name under the package directory.
    default: candidate_good
  allow-amber-baseline-genesis:
    description: Treat the bundled demo BASELINE_GENESIS exit 10 as a successful CI outcome.
    default: "true"
  suite:
    description: Redline suite JSON path.
    default: fixtures/suites/demo_suite.json
  spec:
    description: Redline spec JSON path.
    default: fixtures/specs/redline_spec.json
  out:
    description: Artifact output directory.
    default: artifacts/action-redline

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v8.2.0
    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: uv sync --frozen --extra dev
    - name: Doctor
      shell: bash
      working-directory: ${{ github.action_path }}
      run: uv run redline doctor
    - name: Run Redline
      id: redline
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        REDLINE_ACTION_PACKAGE: ${{ inputs.package }}
        REDLINE_ACTION_BASELINE: ${{ inputs.baseline }}
        REDLINE_ACTION_CANDIDATE: ${{ inputs.candidate }}
        REDLINE_ACTION_SUITE: ${{ inputs.suite }}
        REDLINE_ACTION_SPEC: ${{ inputs.spec }}
        REDLINE_ACTION_OUT: ${{ inputs.out }}
      run: |
        set +e
        resolve_workspace_path() {
          local name="$1"
          local raw="$2"
          if [ -z "$raw" ] || [[ "$raw" = /* ]]; then
            echo "redline action input $name must be a relative path under GITHUB_WORKSPACE" >&2
            return 64
          fi
          python3 - "$GITHUB_WORKSPACE" "$raw" "$name" <<'PY'
        import sys
        from pathlib import Path

        workspace = Path(sys.argv[1]).resolve()
        candidate = (workspace / sys.argv[2]).resolve()
        try:
            candidate.relative_to(workspace)
        except ValueError:
            print(f"redline action input {sys.argv[3]} escapes GITHUB_WORKSPACE", file=sys.stderr)
            sys.exit(64)
        print(candidate)
        PY
        }
        echo "out_path=$GITHUB_WORKSPACE/artifacts/action-redline" >> "$GITHUB_OUTPUT"
        package_path="$(resolve_workspace_path package "$REDLINE_ACTION_PACKAGE")"
        code=$?
        if [ "$code" -eq 0 ]; then
          suite_path="$(resolve_workspace_path suite "$REDLINE_ACTION_SUITE")"
          code=$?
        fi
        if [ "$code" -eq 0 ]; then
          spec_path="$(resolve_workspace_path spec "$REDLINE_ACTION_SPEC")"
          code=$?
        fi
        if [ "$code" -eq 0 ]; then
          out_path="$(resolve_workspace_path out "$REDLINE_ACTION_OUT")"
          code=$?
          if [ "$code" -eq 0 ]; then
            echo "out_path=$out_path" >> "$GITHUB_OUTPUT"
          fi
        fi
        if [ "$code" -eq 0 ]; then
          uv --project "$GITHUB_ACTION_PATH" run redline run "$package_path" \
            --baseline "$REDLINE_ACTION_BASELINE" \
            --candidate "$REDLINE_ACTION_CANDIDATE" \
            --suite "$suite_path" \
            --spec "$spec_path" \
            --out "$out_path" \
            --json
          code=$?
        fi
        echo "exit_code=$code" >> "$GITHUB_OUTPUT"
        exit 0
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: redline-artifacts
        path: ${{ steps.redline.outputs.out_path }}
    - name: Enforce Redline result
      shell: bash
      env:
        REDLINE_ACTION_PACKAGE: ${{ inputs.package }}
        REDLINE_ACTION_ALLOW_AMBER_BASELINE_GENESIS: ${{ inputs.allow-amber-baseline-genesis }}
      run: |
        code="${{ steps.redline.outputs.exit_code }}"
        if [ "$code" -eq 0 ]; then
          exit 0
        fi
        if [ "$code" -eq 10 ] && [ "$REDLINE_ACTION_ALLOW_AMBER_BASELINE_GENESIS" = "true" ] && [ "$REDLINE_ACTION_PACKAGE" = "fixtures/demo_pack" ]; then
          exit 0
        fi
        exit "$code"
