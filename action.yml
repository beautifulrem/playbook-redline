name: Playbook Redline
description: Run Playbook Redline backend verification and upload demo artifacts.

inputs:
  package:
    description: Playbook package directory.
    default: fixtures/demo_pack
  baseline:
    description: Baseline package name under the package directory.
    default: baseline
  candidate:
    description: Candidate package name under the package directory.
    default: candidate_good
  allow-amber-baseline-genesis:
    description: Treat the bundled demo BASELINE_GENESIS exit 10 as a successful CI outcome.
    default: "true"
  suite:
    description: Redline suite JSON path.
    default: fixtures/suites/demo_suite.json
  spec:
    description: Redline spec JSON path.
    default: fixtures/specs/redline_spec.json
  out:
    description: Artifact output directory.
    default: artifacts/action-redline

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v6
    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: uv sync --frozen --extra dev
    - name: Doctor
      shell: bash
      working-directory: ${{ github.action_path }}
      run: uv run redline doctor
    - name: Run Redline
      id: redline
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set +e
        uv --project "${{ github.action_path }}" run redline run "${{ github.workspace }}/${{ inputs.package }}" \
          --baseline "${{ inputs.baseline }}" \
          --candidate "${{ inputs.candidate }}" \
          --suite "${{ github.workspace }}/${{ inputs.suite }}" \
          --spec "${{ github.workspace }}/${{ inputs.spec }}" \
          --out "${{ github.workspace }}/${{ inputs.out }}" \
          --json
        code=$?
        echo "exit_code=$code" >> "$GITHUB_OUTPUT"
        exit 0
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: redline-artifacts
        path: ${{ github.workspace }}/${{ inputs.out }}
    - name: Enforce Redline result
      shell: bash
      run: |
        code="${{ steps.redline.outputs.exit_code }}"
        if [ "$code" -eq 0 ]; then
          exit 0
        fi
        if [ "$code" -eq 10 ] && [ "${{ inputs.allow-amber-baseline-genesis }}" = "true" ] && [ "${{ inputs.package }}" = "fixtures/demo_pack" ]; then
          exit 0
        fi
        exit "$code"
