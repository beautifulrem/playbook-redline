name: Redline CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      remote_smoke:
        description: Run remote smoke against REDLINE_REMOTE_BASE_URL secret.
        required: false
        type: boolean
        default: false

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: redline
          POSTGRES_PASSWORD: redline
          POSTGRES_DB: redline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U redline -d redline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen --extra dev
      - run: uv run python scripts/check-verdict-path-imports.py
      - run: uv run --extra dev pytest
        env:
          REDLINE_TEST_POSTGRES_URL: postgresql://redline:redline@127.0.0.1:5432/redline
      - run: bash scripts/service-smoke.sh
      - run: bash scripts/deployment-smoke.sh
      - name: Remote smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.remote_smoke }}
        env:
          REDLINE_REMOTE_BASE_URL: ${{ secrets.REDLINE_REMOTE_BASE_URL }}
          REDLINE_REMOTE_TOKEN: ${{ secrets.REDLINE_REMOTE_TOKEN }}
        run: bash scripts/remote-smoke.sh
      - run: uv run redline export-schemas --out /tmp/redline-schemas
      - run: |
          cp -R schemas /tmp/checked-schemas
          rm -f /tmp/checked-schemas/service-openapi.json
          diff -ru /tmp/checked-schemas /tmp/redline-schemas
      - run: uv run python scripts/export-service-openapi.py --out /tmp/service-openapi.json
      - run: diff -u schemas/service-openapi.json /tmp/service-openapi.json
      - run: uv run redline make-demo
      - run: uv run python scripts/verify-sponsor-fixture.py
      - run: git diff --exit-code -- schemas artifacts/demo artifacts/sponsor
      - name: Replay pass demo
        run: |
          set +e
          uv run redline check artifacts/demo/pass/receipt.json --package fixtures/demo_pack --rerun --json
          code=$?
          test "$code" -eq 10
      - name: Replay withheld demo
        run: |
          set +e
          uv run redline check artifacts/demo/withheld/receipt.json --package fixtures/demo_pack --rerun --json
          code=$?
          test "$code" -eq 3
